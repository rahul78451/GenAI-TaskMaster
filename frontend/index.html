<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster AI — Intelligent Productivity Suite</title>
    <meta name="description" content="AI-powered multi-agent task management system with smart scheduling, notes, and workflow automation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== DESIGN TOKENS ===== */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(20, 20, 32, 0.75);
            --bg-card-hover: rgba(30, 30, 48, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.04);
            --bg-glass-strong: rgba(255, 255, 255, 0.08);
            --bg-input: rgba(255, 255, 255, 0.06);
            --bg-input-focus: rgba(255, 255, 255, 0.1);

            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-default: rgba(255, 255, 255, 0.1);
            --border-strong: rgba(255, 255, 255, 0.15);
            --border-accent: rgba(99, 102, 241, 0.4);

            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b8;
            --text-tertiary: #6b6b80;
            --text-muted: #4a4a5e;

            --accent-primary: #6366f1;
            --accent-primary-light: #818cf8;
            --accent-secondary: #8b5cf6;
            --accent-glow: rgba(99, 102, 241, 0.25);

            --success: #34d399;
            --success-bg: rgba(52, 211, 153, 0.12);
            --warning: #fbbf24;
            --warning-bg: rgba(251, 191, 36, 0.12);
            --danger: #f87171;
            --danger-bg: rgba(248, 113, 113, 0.12);
            --info: #38bdf8;
            --info-bg: rgba(56, 189, 248, 0.12);

            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --gradient-accent: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
            --gradient-success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --gradient-warm: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
            --gradient-mesh: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                             radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                             radial-gradient(ellipse at 50% 80%, rgba(236, 72, 153, 0.04) 0%, transparent 50%);

            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.15);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;

            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ===== LIGHT MODE OVERRIDES ===== */
        body.light-mode {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --bg-glass: rgba(0, 0, 0, 0.02);
            --bg-glass-strong: rgba(0, 0, 0, 0.04);
            --bg-input: rgba(0, 0, 0, 0.03);
            --bg-input-focus: rgba(0, 0, 0, 0.05);

            --border-subtle: rgba(0, 0, 0, 0.06);
            --border-default: rgba(0, 0, 0, 0.1);
            --border-strong: rgba(0, 0, 0, 0.15);
            --border-accent: rgba(99, 102, 241, 0.35);

            --text-primary: #1a1a2e;
            --text-secondary: #4a4a68;
            --text-tertiary: #8888a0;
            --text-muted: #b0b0c0;

            --accent-glow: rgba(99, 102, 241, 0.15);

            --success: #059669;
            --success-bg: rgba(5, 150, 105, 0.1);
            --warning: #d97706;
            --warning-bg: rgba(217, 119, 6, 0.1);
            --danger: #dc2626;
            --danger-bg: rgba(220, 38, 38, 0.1);
            --info: #0284c7;
            --info-bg: rgba(2, 132, 199, 0.1);

            --gradient-mesh: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                             radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
                             radial-gradient(ellipse at 50% 80%, rgba(236, 72, 153, 0.03) 0%, transparent 50%);

            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.08);
        }

        body.light-mode {
            background-color: var(--bg-primary) !important;
            color: var(--text-primary) !important;
        }

        body.light-mode::before {
            background: var(--gradient-mesh);
        }

        body.light-mode::after {
            opacity: 0;
        }

        body.light-mode ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
        }
        body.light-mode ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.25);
        }

        body.light-mode ::selection {
            background: rgba(99, 102, 241, 0.2);
            color: #1a1a2e;
        }

        /* Light mode: stat cards */
        body.light-mode .stat-card,
        body.light-mode .card {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-subtle) !important;
            color: var(--text-primary) !important;
            box-shadow: var(--shadow-sm) !important;
        }
        body.light-mode .stat-card:hover {
            background: var(--bg-card-hover) !important;
            border-color: var(--border-strong) !important;
            box-shadow: var(--shadow-lg), var(--shadow-glow) !important;
        }
        body.light-mode .stat-card h3 {
            color: var(--text-secondary) !important;
        }
        body.light-mode .stat-card::before {
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.03), transparent);
        }

        /* Light mode: header */
        body.light-mode .header {
            background: rgba(255, 255, 255, 0.9) !important;
            border-bottom: 1px solid var(--border-subtle) !important;
            box-shadow: var(--shadow-sm) !important;
        }

        /* Light mode: typography */
        body.light-mode h1 { color: var(--text-primary) !important; }
        body.light-mode h2 { color: var(--text-primary) !important; }
        body.light-mode h3 { color: var(--text-primary) !important; }
        body.light-mode h4 { color: var(--text-secondary) !important; }
        body.light-mode p { color: var(--text-secondary); }
        body.light-mode label { color: var(--text-secondary) !important; }
        body.light-mode strong { color: var(--text-primary) !important; }

        /* Light mode: navigation */
        body.light-mode nav {
            background: rgba(255, 255, 255, 0.85) !important;
            border-bottom: 1px solid var(--border-subtle) !important;
        }
        body.light-mode nav button {
            color: var(--text-tertiary) !important;
        }
        body.light-mode nav button:hover {
            color: var(--text-secondary) !important;
        }

        /* Light mode: inputs */
        body.light-mode input[type="text"],
        body.light-mode input[type="date"],
        body.light-mode input[type="time"],
        body.light-mode input[type="number"],
        body.light-mode textarea,
        body.light-mode select {
            background: var(--bg-input) !important;
            border: 1px solid var(--border-default) !important;
            color: var(--text-primary) !important;
        }
        body.light-mode input:focus,
        body.light-mode textarea:focus,
        body.light-mode select:focus {
            background: var(--bg-input-focus) !important;
            border-color: var(--accent-primary) !important;
            box-shadow: 0 0 0 3px var(--accent-glow) !important;
        }
        body.light-mode input::placeholder,
        body.light-mode textarea::placeholder {
            color: var(--text-muted) !important;
        }
        body.light-mode select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* Light mode: footer */
        body.light-mode footer {
            background: rgba(255, 255, 255, 0.85) !important;
            border-top: 1px solid var(--border-subtle) !important;
        }
        body.light-mode footer p {
            color: var(--text-muted) !important;
        }

        /* Light mode: modals */
        body.light-mode div[style*="position: fixed"][style*="rgba(0,0,0"] {
            background-color: rgba(0, 0, 0, 0.4) !important;
        }

        /* Light mode: action buttons */
        body.light-mode button[style*="backgroundColor: #d1fae5"] {
            background: var(--success-bg) !important;
            color: var(--success) !important;
            border: 1px solid rgba(5, 150, 105, 0.2) !important;
        }
        body.light-mode button[style*="backgroundColor: #dbeafe"] {
            background: var(--info-bg) !important;
            color: var(--info) !important;
            border: 1px solid rgba(2, 132, 199, 0.2) !important;
        }
        body.light-mode button[style*="backgroundColor: #fee2e2"] {
            background: var(--danger-bg) !important;
            color: var(--danger) !important;
            border: 1px solid rgba(220, 38, 38, 0.2) !important;
        }
        body.light-mode button[style*="backgroundColor: #e5e7eb"] {
            background: var(--bg-glass-strong) !important;
            color: var(--text-secondary) !important;
            border: 1px solid var(--border-default) !important;
        }
        body.light-mode button[style*="backgroundColor: #f3f4f6"] {
            background: var(--bg-glass) !important;
            color: var(--text-tertiary) !important;
            border: 1px solid var(--border-subtle) !important;
        }
        body.light-mode button[style*="backgroundColor: #6b7280"] {
            background: rgba(0, 0, 0, 0.06) !important;
            border: 1px solid var(--border-default) !important;
            color: var(--text-secondary) !important;
        }

        /* Light mode: badges */
        body.light-mode span[style*="backgroundColor: #fee2e2"] {
            background: var(--danger-bg) !important;
            color: var(--danger) !important;
        }
        body.light-mode span[style*="backgroundColor: #fef3c7"],
        body.light-mode span[style*="backgroundColor: #fef08a"] {
            background: var(--warning-bg) !important;
            color: var(--warning) !important;
        }
        body.light-mode span[style*="backgroundColor: #dcfce7"],
        body.light-mode span[style*="backgroundColor: #d1fae5"] {
            background: var(--success-bg) !important;
            color: var(--success) !important;
        }
        body.light-mode span[style*="backgroundColor: #dbeafe"],
        body.light-mode span[style*="backgroundColor: #eff6ff"] {
            background: var(--info-bg) !important;
            color: var(--info) !important;
        }

        /* Light mode: floating AI */
        body.light-mode button[style*="borderRadius: 50%"][style*="width: 60px"] {
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.25), 0 0 40px rgba(99, 102, 241, 0.08) !important;
        }

        /* Light mode: productivity donut inner circle */
        body.light-mode div[style*="conic-gradient"] > div {
            background: var(--bg-secondary) !important;
        }

        /* Light mode: Dashboard cards with dark inline backgrounds */
        body.light-mode div[style*="background-color: rgba(20, 20, 32"] {
            background: rgba(255, 255, 255, 0.9) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06) !important;
        }

        /* Light mode: Glass panels */
        body.light-mode div[style*="background-color: rgba(255, 255, 255, 0.03)"] {
            background: rgba(0, 0, 0, 0.02) !important;
            border-color: rgba(0, 0, 0, 0.06) !important;
        }

        /* Light mode: Floating chat panel */
        body.light-mode div[style*="background-color: rgba(18, 18, 26"] {
            background: rgba(255, 255, 255, 0.95) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12), 0 0 30px rgba(99, 102, 241, 0.05) !important;
            color: #1a1a2e !important;
        }

        /* Light mode: fix inline text colors */
        body.light-mode div[style*="color: #f0f0f5"],
        body.light-mode h2[style*="color: #f0f0f5"],
        body.light-mode h3[style*="color: #f0f0f5"],
        body.light-mode p[style*="color: #f0f0f5"] {
            color: #1a1a2e !important;
        }
        body.light-mode div[style*="color: #6b6b80"],
        body.light-mode p[style*="color: #6b6b80"],
        body.light-mode span[style*="color: #6b6b80"] {
            color: #8888a0 !important;
        }
        body.light-mode div[style*="color: #a0a0b8"],
        body.light-mode h3[style*="color: #a0a0b8"],
        body.light-mode label[style*="color: #a0a0b8"] {
            color: #4a4a68 !important;
        }

        /* Light mode: Floating chat input */
        body.light-mode div[style*="background-color: rgba(255, 255, 255, 0.06)"] {
            background: rgba(0, 0, 0, 0.04) !important;
        }
        body.light-mode input[style*="background-color: rgba(255, 255, 255, 0.06)"] {
            background: rgba(0, 0, 0, 0.04) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
            color: #1a1a2e !important;
        }

        /* Light mode: Chat AI response bubbles */
        body.light-mode div[style*="background-color: rgb(243, 244, 246)"][style*="border-radius: 8px"] {
            background: rgba(0, 0, 0, 0.04) !important;
            color: #1a1a2e !important;
        }

        /* Light mode: Stat card inline dark backgrounds */
        body.light-mode div[style*="background-color: rgba(20, 20, 32"] * {
            color: inherit;
        }
        body.light-mode div[style*="background-color: rgba(20, 20, 32"] h3 {
            color: #4a4a68 !important;
        }
        body.light-mode div[style*="background-color: rgba(20, 20, 32"] p[style*="color: #6b6b80"] {
            color: #8888a0 !important;
        }

        /* Light mode: progress bar background */
        body.light-mode div[style*="background-color: rgba(255, 255, 255, 0.06)"] {
            background: rgba(0, 0, 0, 0.06) !important;
        }

        /* Light mode: focus items */
        body.light-mode .focus-item,
        body.light-mode div[style*="background: linear-gradient(135deg, rgba(102, 126, 234"] {
            background: rgba(99, 102, 241, 0.06) !important;
        }

        /* Light mode: transition for all cards and panels */
        body.light-mode .stat-card,
        body.light-mode .card,
        body.light-mode nav,
        body.light-mode footer,
        body.light-mode .header {
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease !important;
        }

        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Mesh gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient-mesh);
            pointer-events: none;
            z-index: 0;
        }

        /* Animated grain texture overlay */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        #root {
            position: relative;
            z-index: 1;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ===== SELECTION ===== */
        ::selection {
            background: rgba(99, 102, 241, 0.3);
            color: #fff;
        }

        /* ===== GLASS CARDS ===== */
        .glass-effect {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
        }

        .stat-card,
        .card {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-subtle) !important;
            border-radius: var(--radius-lg) !important;
            color: var(--text-primary) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all var(--transition-base) !important;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .stat-card:hover {
            background: var(--bg-card-hover) !important;
            border-color: var(--border-strong) !important;
            box-shadow: var(--shadow-lg), var(--shadow-glow) !important;
            transform: translateY(-4px) !important;
        }

        .stat-card h3 {
            color: var(--text-secondary) !important;
            font-size: 11px !important;
            font-weight: 600 !important;
            letter-spacing: 1.5px !important;
            text-transform: uppercase !important;
        }

        .stat-value {
            color: var(--text-primary) !important;
        }

        /* ===== HEADER ===== */
        .header {
            background: rgba(10, 10, 15, 0.85) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid var(--border-subtle) !important;
            box-shadow: none !important;
            padding: 16px 24px !important;
        }

        /* ===== TYPOGRAPHY ===== */
        h1 {
            font-weight: 800 !important;
            letter-spacing: -0.5px !important;
            color: var(--text-primary) !important;
        }

        h2 {
            font-size: 24px !important;
            font-weight: 700 !important;
            color: var(--text-primary) !important;
            letter-spacing: -0.3px !important;
        }

        h3 {
            color: var(--text-primary) !important;
        }

        h4 {
            color: var(--text-secondary) !important;
        }

        p {
            color: var(--text-secondary);
        }

        /* ===== STATS GRID ===== */
        .stats-grid {
            gap: 16px !important;
            margin: 24px 0 !important;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1280px !important;
            margin: 0 auto !important;
            padding: 24px !important;
            animation: fadeIn 0.5s ease-out !important;
        }

        /* ===== BUTTONS ===== */
        button {
            font-family: 'Inter', sans-serif !important;
            transition: all var(--transition-base) !important;
            cursor: pointer;
            outline: none;
        }

        button:focus-visible {
            outline: 2px solid var(--accent-primary);
            outline-offset: 2px;
        }

        button:active {
            transform: scale(0.97) !important;
        }

        .btn-primary {
            background: var(--gradient-primary) !important;
            border: none !important;
            color: white !important;
            font-weight: 600 !important;
            letter-spacing: 0.3px !important;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35) !important;
        }

        /* ===== INPUTS ===== */
        input[type="text"],
        input[type="date"],
        input[type="time"],
        input[type="number"],
        textarea,
        select {
            background: var(--bg-input) !important;
            border: 1px solid var(--border-default) !important;
            border-radius: var(--radius-sm) !important;
            color: var(--text-primary) !important;
            font-family: 'Inter', sans-serif !important;
            transition: all var(--transition-fast) !important;
            caret-color: var(--accent-primary);
        }

        input:focus,
        textarea:focus,
        select:focus {
            background: var(--bg-input-focus) !important;
            border-color: var(--accent-primary) !important;
            box-shadow: 0 0 0 3px var(--accent-glow) !important;
            outline: none !important;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--text-muted) !important;
        }

        select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* ===== STATUS BADGES ===== */
        .status-badge {
            border-radius: var(--radius-full) !important;
            font-weight: 600 !important;
            letter-spacing: 0.5px !important;
        }

        .status-pending {
            background: var(--warning-bg) !important;
            color: var(--warning) !important;
        }

        .status-completed {
            background: var(--success-bg) !important;
            color: var(--success) !important;
        }

        .status-in-progress {
            background: var(--info-bg) !important;
            color: var(--info) !important;
        }

        .priority-high { color: var(--danger) !important; }
        .priority-medium { color: var(--warning) !important; }
        .priority-low { color: var(--success) !important; }

        /* ===== FOCUS ITEM ===== */
        .focus-item {
            background: var(--bg-glass) !important;
            border-left: 3px solid var(--accent-primary) !important;
            border-radius: var(--radius-sm) !important;
            transition: all var(--transition-base) !important;
        }

        .focus-item:hover {
            background: var(--bg-glass-strong) !important;
            transform: translateX(4px);
        }

        .focus-number {
            color: var(--accent-primary-light) !important;
        }

        /* ===== TIMER ===== */
        .timer-display {
            font-family: 'Inter', monospace !important;
            font-weight: 800 !important;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 30px currentColor;
        }

        /* ===== TAB NAVIGATION ===== */
        nav {
            background: rgba(10, 10, 15, 0.75) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border-bottom: 1px solid var(--border-subtle) !important;
            padding: 0 24px !important;
        }

        nav button {
            color: var(--text-tertiary) !important;
            background: transparent !important;
            border: none !important;
            padding: 14px 20px !important;
            font-size: 13px !important;
            font-weight: 500 !important;
            letter-spacing: 0.3px !important;
            position: relative;
            transition: color var(--transition-base) !important;
        }

        nav button:hover {
            color: var(--text-secondary) !important;
        }

        /* Active tab glow effect */
        nav button[style*="border-bottom: 2px solid"] {
            color: var(--accent-primary-light) !important;
        }

        /* ===== FOOTER ===== */
        footer {
            background: rgba(10, 10, 15, 0.75) !important;
            border-top: 1px solid var(--border-subtle) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
        }

        footer p {
            color: var(--text-muted) !important;
        }

        /* ===== MODALS ===== */
        div[style*="position: fixed"][style*="rgba(0,0,0"] {
            background-color: rgba(0, 0, 0, 0.7) !important;
            backdrop-filter: blur(8px) !important;
            -webkit-backdrop-filter: blur(8px) !important;
        }

        div[style*="maxWidth: 500px"],
        div[style*="maxWidth: 600px"],
        div[style*="maxWidth: 700px"],
        div[style*="max-width: 500px"],
        div[style*="backgroundColor: #ffffff"][style*="borderRadius: 16px"],
        div[style*="backgroundColor: white"][style*="borderRadius: 12px"][style*="boxShadow"] {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-default) !important;
            box-shadow: var(--shadow-lg), var(--shadow-glow) !important;
            color: var(--text-primary) !important;
        }

        /* ===== CARDS & SECTIONS ===== */
        div[style*="backgroundColor: white"][style*="borderRadius: 12px"],
        div[style*="backgroundColor: white"][style*="borderRadius: 10px"],
        div[style*="backgroundColor: #ffffff"] {
            background: var(--bg-card) !important;
            border-color: var(--border-subtle) !important;
            color: var(--text-primary) !important;
        }

        div[style*="backgroundColor: #f5f5f5"],
        div[style*="backgroundColor: #fafbfc"],
        div[style*="backgroundColor: #f9fafb"],
        div[style*="backgroundColor: #f0f4ff"],
        div[style*="backgroundColor: #eff6ff"],
        div[style*="backgroundColor: #f0f0f0"],
        div[style*="backgroundColor: #f9f9f9"] {
            background: var(--bg-glass) !important;
            border-color: var(--border-subtle) !important;
            color: var(--text-primary) !important;
        }

        div[style*="backgroundColor: #f3f4f6"] {
            background: var(--bg-glass) !important;
        }

        /* Getting Started section */
        div[style*="backgroundColor: #f9fafb"][style*="borderRadius: 8px"][style*="border: 1px solid #f3f4f6"] {
            background: var(--bg-glass-strong) !important;
            border: 1px solid var(--border-subtle) !important;
        }

        /* Task items */
        div[style*="backgroundColor: white"][style*="padding: 18px"][style*="borderRadius: 10px"] {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-subtle) !important;
        }

        div[style*="backgroundColor: white"][style*="padding: 18px"][style*="borderRadius: 10px"]:hover {
            background: var(--bg-card-hover) !important;
            border-color: var(--border-strong) !important;
        }

        /* Event items */
        div[style*="backgroundColor: white"][style*="padding: 16px"][style*="borderRadius: 10px"] {
            background: var(--bg-card) !important;
        }

        /* Focus timer yellow section */
        div[style*="backgroundColor: #fef3c7"] {
            background: rgba(251, 191, 36, 0.08) !important;
            border-color: rgba(251, 191, 36, 0.25) !important;
        }

        div[style*="backgroundColor: #fef3c7"] label,
        div[style*="backgroundColor: #fef3c7"] div {
            color: var(--warning) !important;
        }

        /* Timer display inside edit modal */
        div[style*="border: 2px solid #fbbf24"][style*="backgroundColor: white"] {
            background: var(--bg-glass-strong) !important;
            border-color: rgba(251, 191, 36, 0.3) !important;
            color: var(--text-primary) !important;
        }

        /* ===== ACTION BUTTONS ===== */
        /* Done button */
        button[style*="backgroundColor: #d1fae5"] {
            background: var(--success-bg) !important;
            color: var(--success) !important;
            border: 1px solid rgba(52, 211, 153, 0.2) !important;
        }
        button[style*="backgroundColor: #d1fae5"]:hover,
        button[style*="backgroundColor: #a7f3d0"] {
            background: rgba(52, 211, 153, 0.2) !important;
        }

        /* Edit button */
        button[style*="backgroundColor: #dbeafe"] {
            background: var(--info-bg) !important;
            color: var(--info) !important;
            border: 1px solid rgba(56, 189, 248, 0.2) !important;
        }
        button[style*="backgroundColor: #dbeafe"]:hover,
        button[style*="backgroundColor: #bfdbfe"] {
            background: rgba(56, 189, 248, 0.2) !important;
        }

        /* Delete button */
        button[style*="backgroundColor: #fee2e2"] {
            background: var(--danger-bg) !important;
            color: var(--danger) !important;
            border: 1px solid rgba(248, 113, 113, 0.2) !important;
        }
        button[style*="backgroundColor: #fee2e2"]:hover,
        button[style*="backgroundColor: #fecaca"] {
            background: rgba(248, 113, 113, 0.2) !important;
        }

        /* Cancel button */
        button[style*="backgroundColor: #e5e7eb"] {
            background: var(--bg-glass-strong) !important;
            color: var(--text-secondary) !important;
            border: 1px solid var(--border-default) !important;
        }

        /* Primary action buttons */
        button[style*="backgroundColor: #6366f1"],
        button[style*="backgroundColor: #4f46e5"],
        button[style*="backgroundColor: #8b5cf6"] {
            background: var(--gradient-primary) !important;
            border: none !important;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.25) !important;
        }
        button[style*="backgroundColor: #6366f1"]:hover,
        button[style*="backgroundColor: #4f46e5"]:hover,
        button[style*="backgroundColor: #8b5cf6"]:hover {
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4) !important;
            transform: translateY(-1px) !important;
        }

        /* Success buttons */
        button[style*="backgroundColor: #10b981"] {
            background: var(--gradient-success) !important;
            border: none !important;
            box-shadow: 0 2px 12px rgba(16, 185, 129, 0.25) !important;
        }

        /* Danger/stop buttons */
        button[style*="backgroundColor: #ef4444"] {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%) !important;
            border: none !important;
        }

        /* Filter buttons */
        button[style*="backgroundColor: #f3f4f6"] {
            background: var(--bg-glass) !important;
            color: var(--text-tertiary) !important;
            border: 1px solid var(--border-subtle) !important;
        }
        button[style*="backgroundColor: #f3f4f6"]:hover {
            background: var(--bg-glass-strong) !important;
            color: var(--text-secondary) !important;
        }

        /* Gray buttons */
        button[style*="backgroundColor: #6b7280"] {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid var(--border-default) !important;
        }

        /* Quick template buttons */
        button[style*="backgroundColor: white"][style*="border: 1px solid #ddd"] {
            background: var(--bg-glass) !important;
            border: 1px solid var(--border-subtle) !important;
            color: var(--text-secondary) !important;
        }
        button[style*="backgroundColor: white"][style*="border: 1px solid #ddd"]:hover {
            background: var(--bg-glass-strong) !important;
            border-color: var(--border-strong) !important;
            color: var(--text-primary) !important;
        }

        /* Category buttons */
        button[style*="backgroundColor: #e5e7eb"] {
            background: var(--bg-glass) !important;
            color: var(--text-tertiary) !important;
            border: 1px solid var(--border-subtle) !important;
        }

        /* ===== BADGE COLORS (priority / status indicators) ===== */
        span[style*="backgroundColor: #fee2e2"] {
            background: var(--danger-bg) !important;
            color: var(--danger) !important;
        }
        span[style*="backgroundColor: #fef3c7"],
        span[style*="backgroundColor: #fef08a"] {
            background: var(--warning-bg) !important;
            color: var(--warning) !important;
        }
        span[style*="backgroundColor: #dcfce7"],
        span[style*="backgroundColor: #d1fae5"] {
            background: var(--success-bg) !important;
            color: var(--success) !important;
        }
        span[style*="backgroundColor: #dbeafe"],
        span[style*="backgroundColor: #eff6ff"] {
            background: var(--info-bg) !important;
            color: var(--info) !important;
        }

        /* ===== FLOATING AI CHAT ===== */
        button[style*="borderRadius: 50%"][style*="width: 60px"] {
            background: var(--gradient-primary) !important;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4), 0 0 40px rgba(99, 102, 241, 0.15) !important;
            border: 2px solid rgba(255, 255, 255, 0.1) !important;
        }

        button[style*="borderRadius: 50%"][style*="width: 60px"]:hover {
            box-shadow: 0 6px 30px rgba(99, 102, 241, 0.5), 0 0 60px rgba(99, 102, 241, 0.2) !important;
            transform: scale(1.08) !important;
        }

        /* Floating chat panel */
        div[style*="width: 350px"][style*="height: 500px"][style*="borderRadius: 12px"] {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-default) !important;
            box-shadow: var(--shadow-lg), var(--shadow-glow) !important;
            color: var(--text-primary) !important;
        }

        div[style*="width: 350px"][style*="height: 500px"] div[style*="borderBottom"] {
            border-color: var(--border-subtle) !important;
            color: var(--text-primary) !important;
        }

        div[style*="width: 350px"][style*="height: 500px"] div[style*="borderTop"] {
            border-color: var(--border-subtle) !important;
        }

        div[style*="width: 350px"][style*="height: 500px"] input {
            background: var(--bg-input) !important;
            border: 1px solid var(--border-default) !important;
            color: var(--text-primary) !important;
        }

        /* Chat message bubbles */
        div[style*="backgroundColor: #f3f4f6"][style*="borderRadius: 8px"][style*="padding: 10px"] {
            background: var(--bg-glass-strong) !important;
            color: var(--text-primary) !important;
        }

        /* Search results container */
        div[style*="backgroundColor: #eff6ff"][style*="border: 2px solid #0ea5e9"] {
            background: rgba(56, 189, 248, 0.06) !important;
            border: 1px solid rgba(56, 189, 248, 0.2) !important;
        }

        div[style*="backgroundColor: white"][style*="border: 1px solid #bfdbfe"] {
            background: var(--bg-glass-strong) !important;
            border: 1px solid var(--border-subtle) !important;
        }

        /* Schedule form */
        div[style*="backgroundColor: #f0f4ff"][style*="border: 2px solid #8b5cf6"] {
            background: rgba(99, 102, 241, 0.06) !important;
            border: 1px solid rgba(99, 102, 241, 0.2) !important;
        }

        /* Empty state containers */
        div[style*="border: 2px dashed #e5e7eb"] {
            border: 2px dashed var(--border-default) !important;
            background: var(--bg-glass) !important;
        }

        /* Expanded task section */
        div[style*="backgroundColor: #f9fafb"][style*="borderLeft: 4px solid #3b82f6"] {
            background: var(--bg-glass) !important;
            border-left: 4px solid var(--accent-primary) !important;
        }

        /* ===== LABEL STYLES ===== */
        label {
            color: var(--text-secondary) !important;
        }

        strong {
            color: var(--text-primary) !important;
        }

        /* ===== CONIC GRADIENT FIX FOR PRODUCTIVITY CIRCLE ===== */
        div[style*="conic-gradient"] > div {
            background: var(--bg-secondary) !important;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scalePop {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes subtleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
            50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.35); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Apply animations */
        .stat-card {
            animation: slideUp 0.5s ease-out backwards !important;
        }
        .stat-card:nth-child(1) { animation-delay: 0.05s !important; }
        .stat-card:nth-child(2) { animation-delay: 0.1s !important; }
        .stat-card:nth-child(3) { animation-delay: 0.15s !important; }
        .stat-card:nth-child(4) { animation-delay: 0.2s !important; }
        .stat-card:nth-child(5) { animation-delay: 0.25s !important; }

        /* Modal animations */
        div[style*="position: fixed"] {
            animation: fadeIn 0.25s ease-out !important;
        }

        div[style*="maxWidth: 500px"],
        div[style*="maxWidth: 600px"],
        div[style*="maxWidth: 700px"] {
            animation: scalePop 0.3s ease-out !important;
        }

        /* List item animations */
        li, tr, [role="listitem"] {
            animation: slideUp 0.4s ease-out backwards;
        }

        .fade-in { animation: fadeInUp 0.3s ease-out; }
        .scale-in { animation: scalePop 0.3s ease-out; }
        .slide-down { animation: slideDown 0.3s ease-out; }

        h2 {
            animation: slideDown 0.4s ease-out;
        }

        /* Hover bounce for icons */
        span[style*="fontSize: 24px"],
        span[style*="fontSize: 28px"],
        span[style*="fontSize: 18px"] {
            transition: transform var(--transition-base);
        }
        span[style*="fontSize: 24px"]:hover,
        span[style*="fontSize: 28px"]:hover {
            animation: subtleBounce 0.5s ease-in-out;
        }

        /* Floating AI button pulse */
        button[style*="borderRadius: 50%"][style*="width: 60px"] {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }
            .container {
                padding: 16px !important;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="./api.js?v=5"></script>
    <script src="./app_v11.js"></script>
</body>
</html>
